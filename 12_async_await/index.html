<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

        function getUserData() {
            return new Promise((resolve) => {
                setTimeout(() => resolve({ id: 1, name: "Олена" }), 1000);
            });
        }

        function getUserFriends(userId) {
            return new Promise((resolve) => {
                setTimeout(() => resolve(["Іван", "Марія", "Петро"]), 1000);
            });
        }

        function fetchUsers() {
            return new Promise((resolve) => {
                setTimeout(() => resolve(["Олена", "Іван", "Анна"]), 1000);
            });
        }

        function fetchPosts() {
            return new Promise((resolve) => {
                setTimeout(() => resolve(["Пост 1", "Пост 2"]), 1000);
            });
        }

        function fetchComments() {
            return new Promise((resolve) => {
                setTimeout(() => resolve(["Круто!", "Згоден"]), 1000);
            });
        }

        function getBrokenData() {
            return new Promise((_, reject) => {
                setTimeout(() => reject(new Error("Сервер недоступний (помилка 500)")), 1500);
            });
        }

        async function sayHello() {
            return "Привіт!"; // Насправді повертає Promise, який містить "Привіт!"
        }

        sayHello().then(console.log); // Виведе: "Привіт!"

        async function getProcessData() {
            // Імітація запиту на 2 секунди
            const myPromise = new Promise((resolve) => setTimeout(() => resolve("Дані отримано"), 2000));

            console.log("Очікуємо...");

            // Код зупиняється на цьому рядку, поки проміс не виконається
            const result = await myPromise;

            console.log(result); // Виведе: "Дані отримано" (через 2 секунди)
        }

        function fetchUser() {
            getUserData()
                .then((user) => {
                    return getUserFriends(user.id);
                })
                .then((friends) => {
                    console.log("Друзі:", friends);
                });
        }

        async function fetchUser() {
            const user = await getUserData();
            const friends = await getUserFriends(user.id);
            console.log("Друзі:", friends);
        }

        async function fetchServerData() {
            try {
                console.log("Починаємо запит...");

                // Якщо цей проміс завершиться з помилкою, виконання одразу перестрибне в catch
                const response = await fetch('https://неіснуючий-сайт.com/api');
                const data = await response.json();

                console.log("Успіх:", data);
            } catch (error) {
                // Всі помилки з await перехоплюються тут
                console.error("Ой, сталася помилка:", error.message);
            } finally {
                console.log("Запит завершено (успішно чи ні).");
            }
        }

        async function getMultipleThings() {
            // Кожен запит чекає завершення попереднього (сумарно 3 секунди)
            const users = await fetchUsers();     // займає 1 сек
            const posts = await fetchPosts();     // займає 1 сек
            const comments = await fetchComments(); // займає 1 сек
        }

        async function getMultipleThingsFast() {
            // Запускаємо всі запити одночасно (сумарно 1 секунда!)
            const [users, posts, comments] = await Promise.all([
                fetchUsers(),
                fetchPosts(),
                fetchComments()
            ]);
        }

        async function displayUser(userId) {
            try {
                const response = await fetch(`https://jsonplaceholder.typicode.com/users/${userId}`);

                // Перевіряємо, чи HTTP-статус у діапазоні 200-299
                if (!response.ok) {
                    throw new Error(`Помилка HTTP: ${response.status}`);
                }

                const user = await response.json();
                console.log(`Ім'я користувача: ${user.name}, Email: ${user.email}`);

            } catch (err) {
                console.error("Не вдалося завантажити користувача:", err.message);
            }
        }

        displayUser(1); // Виклик функції

        async function fetchServerData() {
            try {
                console.log("Починаємо запит до сервера...");

                // getBrokenData() гарантовано поверне reject з помилкою
                const data = await getBrokenData();

                console.log("Успіх:", data); // Цей рядок ніколи не виконається
            } catch (error) {
                // Помилка з await перехоплюється тут
                console.error("Ой, сталася помилка:", error.message);
            } finally {
                console.log("Запит завершено (успішно чи ні).");
            }
        }

        // Додаткова функція-імітатор для цього прикладу
        function getUserDetails(userId) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (userId === 1) {
                        resolve({ id: 1, name: "Олександр", role: "Адмін" });
                    } else {
                        reject(new Error(`Користувача з ID ${userId} не знайдено в базі.`));
                    }
                }, 1200);
            });
        }

        // Головна функція для роботи з даними
        async function displayUser(userId) {
            console.log(`Шукаємо користувача ID: ${userId}...`);

            try {
                const user = await getUserDetails(userId);
                console.log(`✅ Знайдено! Ім'я: ${user.name}, Роль: ${user.role}`);
            } catch (err) {
                console.error(`❌ Помилка:`, err.message);
            }
        }

        // Практична перевірка:
        // displayUser(1); // Виведе успішний результат
        // displayUser(99); // Виведе перехоплену помилку
    </script>
</body>

</html>
